name: aurora-stable-ipu6
description: Aurora with Intel IPU6 camera drivers

base-image: ghcr.io/ublue-os/aurora
image-version: stable

modules:
  - type: containerfile
    snippets:
      - COPY --from=ghcr.io/n3thshan/akmod-intel-ipu6:latest /rpms/ /tmp/rpms/
      - RUN rpm-ostree install /tmp/rpms/kmod-intel-ipu6*.rpm && rm -rf /tmp/rpms

  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      - ipu6-camera-hal

  - type: signing
